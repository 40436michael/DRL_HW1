<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Iteration Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load FontAwesome for arrows -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>HW1: GridWorld</h1>
            <p>Interactive HW1 Grid World Policy Finder</p>
        </header>

        <main>
            <div class="controls-panel card">
                <h3>Grid Controls</h3>
                <div style="margin-bottom: 1rem;">
                    <label for="grid-size-input"
                        style="display:block; margin-bottom:0.5rem; color:var(--text-primary); font-weight:600;">
                        Grid Size (<span id="size-label">5</span>x<span id="size-label2">5</span>)
                    </label>
                    <input type="range" id="grid-size-input" min="5" max="9" value="5"
                        style="width:100%; accent-color: var(--btn-primary);">
                </div>

                <div class="mode-toggles">
                    <button class="mode-btn active" data-mode="setStart">Set Start Point</button>
                    <button class="mode-btn" data-mode="setEnd">Set End Point</button>
                    <button class="mode-btn" data-mode="toggleBlock">Toggle Block</button>
                </div>

                <p style="margin-top:0.5rem; margin-bottom:1rem; font-size:0.85rem; color:var(--text-secondary);">
                    Obstacles: <span id="obs-count">3</span> / <span id="obs-max">3</span>
                </p>

                <h3>Actions</h3>
                <div class="action-buttons">
                    <button id="btnRandom" class="action-btn">Show Random Policy</button>
                    <button id="btnValueIter" class="action-btn primary">Run Value Iteration</button>
                    <button id="btnReset" class="action-btn danger">Reset Grid</button>
                </div>
            </div>

            <div class="grid-panel card">
                <div id="grid-container" class="grid-container">
                    <!-- Grid generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
